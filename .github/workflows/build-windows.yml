name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build renderer
        run: npm run build:renderer

      - name: Decode code signing certificate
        run: |
          echo "${{ secrets.WIN_CSC_LINK }}" | base64 --decode > codesign.pfx
        shell: bash

      - name: Package with electron-builder
        run: npx electron-builder --win --publish never --config electron-builder.config.js
        env:
          DEBUG: electron-builder
          CSC_LINK: codesign.pfx
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: List output directories
        run: |
          if exist release (dir release /s /b) else echo "release/ not found"
          if exist dist (dir dist /s /b) else echo "dist/ not found"
        shell: cmd
        continue-on-error: true

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: ambulatory-patients-windows
          path: release/**/*.exe
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build renderer
        run: npm run build:renderer

      - name: Package with electron-builder
        run: npx electron-builder --mac --publish never --config electron-builder.config.js
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          DEBUG: electron-builder

      - name: List output directories
        run: ls -la release/ 2>/dev/null || echo "release/ not found"; ls -la dist/ 2>/dev/null || echo "dist/ not found"
        continue-on-error: true

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: ambulatory-patients-mac
          path: release/**/*.dmg
          retention-days: 30
