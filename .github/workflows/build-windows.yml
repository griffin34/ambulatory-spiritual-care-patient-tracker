name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: List release directory
        run: dir release
        shell: cmd
        continue-on-error: true

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: ambulatory-patients-windows
          path: release/**/*.exe
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List release directory
        run: ls -la release/ || echo "release/ not found"
        continue-on-error: true

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: ambulatory-patients-mac
          path: release/**/*.dmg
          retention-days: 30
